<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wealth Guide - 智能资产配置</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0f1c;
            --bg-secondary: #111827;
            --bg-card: rgba(17, 24, 39, 0.8);
            --bg-glass: rgba(17, 24, 39, 0.6);
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.3);
            --purple: #6366f1;
            --gold: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-muted: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --gradient-primary: linear-gradient(135deg, #00d4aa 0%, #00a896 100%);
            --gradient-gold: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(0, 212, 170, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 170, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--gradient-primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--shadow-glow);
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .market-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
        }

        .market-dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .time-badge {
            color: var(--text-secondary);
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: var(--bg-primary);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-card);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-icon {
            font-size: 16px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 4px;
        }

        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }

        .stat-change {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            display: inline-block;
        }

        .stat-change.up {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
        }

        .stat-change.down {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
        }

        /* Charts Grid */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 1024px) {
            .charts-grid { grid-template-columns: 1fr; }
        }

        .chart-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            backdrop-filter: blur(12px);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-title-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient-primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chart-container {
            position: relative;
            height: 280px;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
        }

        .chart-center-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .chart-center-label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Risk Gauges */
        .gauge-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        @media (max-width: 1024px) {
            .gauge-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .gauge-grid { grid-template-columns: 1fr; }
        }

        .gauge-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
        }

        .gauge-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 16px;
            position: relative;
        }

        .gauge-circle svg {
            transform: rotate(-90deg);
        }

        .gauge-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.08);
            stroke-width: 8;
        }

        .gauge-fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease;
        }

        .gauge-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        .gauge-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Recommendations Grid */
        .recommend-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .recommend-grid { grid-template-columns: 1fr; }
        }

        .recommend-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
        }

        .recommend-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .recommend-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .recommend-icon.action { background: rgba(99, 102, 241, 0.2); }
        .recommend-icon.pick { background: rgba(245, 158, 11, 0.2); }

        .recommend-title {
            font-size: 18px;
            font-weight: 600;
        }

        .action-list { display: flex; flex-direction: column; gap: 12px; }

        .action-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border-left: 3px solid var(--accent);
            transition: all 0.2s;
        }

        .action-item:hover {
            background: rgba(0, 0, 0, 0.4);
            transform: translateX(4px);
        }

        .action-item.buy { border-left-color: var(--success); }
        .action-item.sell { border-left-color: var(--danger); }

        .action-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .action-badge.buy {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .action-badge.sell {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .action-content { flex: 1; }
        .action-asset { font-weight: 600; margin-bottom: 4px; }
        .action-reason { font-size: 12px; color: var(--text-muted); }

        .action-amount {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent);
        }

        .pick-list { display: flex; flex-direction: column; gap: 12px; }

        .pick-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            transition: all 0.2s;
        }

        .pick-item:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .pick-info { display: flex; flex-direction: column; gap: 4px; }
        .pick-name { font-weight: 600; }
        .pick-type { font-size: 12px; color: var(--text-muted); }

        .pick-return {
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--success);
        }

        /* Allocation Table */
        .allocation-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
        }

        .allocation-table {
            width: 100%;
            border-collapse: collapse;
        }

        .allocation-table th,
        .allocation-table td {
            padding: 16px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .allocation-table th {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 500;
        }

        .allocation-table tbody tr {
            transition: background 0.2s;
        }

        .allocation-table tbody tr:hover {
            background: rgba(0, 0, 0, 0.2);
        }

        .asset-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .asset-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .asset-icon.money { background: rgba(0, 212, 170, 0.2); }
        .asset-icon.bank { background: rgba(59, 130, 246, 0.2); }
        .asset-icon.bond { background: rgba(167, 139, 250, 0.2); }
        .asset-icon.fund { background: rgba(244, 114, 182, 0.2); }
        .asset-icon.gold { background: rgba(251, 191, 36, 0.2); }
        .asset-icon.forex { background: rgba(52, 211, 153, 0.2); }

        .ratio-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            overflow: hidden;
        }

        .ratio-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        .amount-cell {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .return-cell {
            font-family: 'JetBrains Mono', monospace;
            color: var(--success);
        }

        .risk-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }

        .risk-badge.low { background: rgba(16, 185, 129, 0.15); color: var(--success); }
        .risk-badge.medium { background: rgba(245, 158, 11, 0.15); color: var(--gold); }
        .risk-badge.high { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Market Sentiment */
        .sentiment-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            margin-bottom: 32px;
        }

        .sentiment-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .sentiment-grid { grid-template-columns: 1fr; }
        }

        .sentiment-item {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            text-align: center;
        }

        .sentiment-value {
            font-size: 28px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            margin-bottom: 8px;
        }

        .sentiment-value.up { color: var(--success); }
        .sentiment-value.down { color: var(--danger); }

        .sentiment-label {
            font-size: 13px;
            color: var(--text-muted);
        }

        .sentiment-therm {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            margin-top: 12px;
            overflow: hidden;
        }

        .sentiment-therm-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: 12px;
            border-top: 1px solid var(--border);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 255, 255, 0.08);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Count Animation */
        .count-up {
            transition: all 0.3s;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success { border-left: 3px solid var(--success); }
        .toast.error { border-left: 3px solid var(--danger); }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { flex-direction: column; gap: 16px; align-items: flex-start; }
            .header-right { width: 100%; justify-content: space-between; }
            .stat-value { font-size: 24px; }
            .chart-container { height: 220px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">💎</div>
                <div class="brand">
                    <h1>Wealth Guide</h1>
                    <span>智能资产配置系统</span>
                </div>
            </div>
            <div class="header-right">
                <div class="market-badge">
                    <div class="market-dot"></div>
                    <span>市场交易中</span>
                </div>
                <span class="time-badge" id="lastUpdated">--</span>
                <button class="btn btn-secondary" onclick="refreshData()" id="refreshBtn">
                    🔄 刷新
                </button>
                <button class="btn btn-primary" onclick="pushToFeishu()" id="pushBtn">
                    📨 推送飞书
                </button>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label"><span class="stat-icon">💰</span> 总资产</div>
                <div class="stat-value" id="totalCapital">-</div>
                <span class="stat-change up" id="capitalChange">+0.00%</span>
            </div>
            <div class="stat-card">
                <div class="stat-label"><span class="stat-icon">📈</span> 预期年化</div>
                <div class="stat-value positive" id="expectedReturn">-</div>
                <span class="stat-sub">组合预期收益</span>
            </div>
            <div class="stat-card">
                <div class="stat-label"><span class="stat-icon">⚖️</span> 夏普比率</div>
                <div class="stat-value" id="sharpeRatio">-</div>
                <span class="stat-sub">风险调整收益</span>
            </div>
            <div class="stat-card">
                <div class="stat-label"><span class="stat-icon">⚠️</span> VaR (95%)</div>
                <div class="stat-value" id="var95">-</div>
                <span class="stat-sub">最大潜在损失</span>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <div class="chart-title-icon">📊</div>
                        资产配置
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                    <div class="chart-center">
                        <div class="chart-center-value" id="totalDisplay">5000万</div>
                        <div class="chart-center-label">总资产</div>
                    </div>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <div class="chart-title-icon">📈</div>
                        收益走势
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Risk Gauges -->
        <div class="gauge-grid">
            <div class="gauge-card">
                <div class="gauge-circle">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle class="gauge-bg" cx="50" cy="50" r="42"/>
                        <circle class="gauge-fill" id="riskGauge" cx="50" cy="50" r="42" 
                            stroke="var(--accent)" stroke-dasharray="264" stroke-dashoffset="132"/>
                    </svg>
                    <div class="gauge-value" id="riskLevel">中</div>
                </div>
                <div class="gauge-label">风险等级</div>
            </div>
            <div class="gauge-card">
                <div class="gauge-circle">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle class="gauge-bg" cx="50" cy="50" r="42"/>
                        <circle class="gauge-fill" cx="50" cy="50" r="42" 
                            stroke="var(--purple)" stroke-dasharray="264" stroke-dashoffset="66"/>
                    </svg>
                    <div class="gauge-value" id="volatility">-</div>
                </div>
                <div class="gauge-label">年化波动率</div>
            </div>
            <div class="gauge-card">
                <div class="gauge-circle">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle class="gauge-bg" cx="50" cy="50" r="42"/>
                        <circle class="gauge-fill" cx="50" cy="50" r="42" 
                            stroke="var(--gold)" stroke-dasharray="264" stroke-dashoffset="198"/>
                    </svg>
                    <div class="gauge-value" id="maxDrawdown">-</div>
                </div>
                <div class="gauge-label">最大回撤</div>
            </div>
            <div class="gauge-card">
                <div class="gauge-circle">
                    <svg width="100" height="100" viewBox="0 0 100 100">
                        <circle class="gauge-bg" cx="50" cy="50" r="42"/>
                        <circle class="gauge-fill" cx="50" cy="50" r="42" 
                            stroke="var(--success)" stroke-dasharray="264" stroke-dashoffset="211"/>
                    </svg>
                    <div class="gauge-value" id="liquidity">优</div>
                </div>
                <div class="gauge-label">流动性</div>
            </div>
        </div>

        <!-- Recommendations -->
        <div class="recommend-grid">
            <div class="recommend-card">
                <div class="recommend-header">
                    <div class="recommend-icon action">💡</div>
                    <div class="recommend-title">今日操作建议</div>
                </div>
                <div class="action-list" id="rebalanceActions">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
            <div class="recommend-card">
                <div class="recommend-header">
                    <div class="recommend-icon pick">🎯</div>
                    <div class="recommend-title">精选推荐</div>
                </div>
                <div class="pick-list" id="topPicks">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>

        <!-- Allocation Table -->
        <div class="allocation-section">
            <div class="chart-header">
                <div class="chart-title">
                    <div class="chart-title-icon">💼</div>
                    资产明细
                </div>
            </div>
            <table class="allocation-table">
                <thead>
                    <tr>
                        <th>资产类别</th>
                        <th>配置比例</th>
                        <th>目标金额</th>
                        <th>预期收益</th>
                        <th>风险等级</th>
                    </tr>
                </thead>
                <tbody id="allocationTable">
                    <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
                </tbody>
            </table>
        </div>

        <!-- Market Sentiment -->
        <div class="sentiment-section">
            <div class="chart-header">
                <div class="chart-title">
                    <div class="chart-title-icon">🌡️</div>
                    市场情绪
                </div>
            </div>
            <div class="sentiment-grid">
                <div class="sentiment-item">
                    <div class="sentiment-value" id="shIndex">-</div>
                    <div class="sentiment-label">上证指数</div>
                    <div class="sentiment-therm">
                        <div class="sentiment-therm-fill" id="shThermo" style="width: 50%; background: var(--accent);"></div>
                    </div>
                </div>
                <div class="sentiment-item">
                    <div class="sentiment-value" id="hs300Index">-</div>
                    <div class="sentiment-label">沪深300</div>
                    <div class="sentiment-therm">
                        <div class="sentiment-therm-fill" id="hs300Thermo" style="width: 50%; background: var(--purple);"></div>
                    </div>
                </div>
                <div class="sentiment-item">
                    <div class="sentiment-value" id="sentimentScore">-</div>
                    <div class="sentiment-label">市场情绪评分</div>
                    <div class="sentiment-therm">
                        <div class="sentiment-therm-fill" id="sentimentThermo" style="width: 50%; background: var(--gold);"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            ⚠️ 本建议仅供参考，投资有风险，入市需谨慎 | Wealth Guide v2.0
        </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastIcon">✅</span>
        <span id="toastMessage">操作成功</span>
    </div>

    <script>
        // Global state
        let allocationChart = null;
        let performanceChart = null;
        let currentData = null;
        const colorMap = {
            '货币基金': '#00d4aa',
            '银行理财': '#3b82f6',
            '债券': '#a78bfa',
            '公募基金': '#f472b6',
            '黄金': '#fbbf24',
            '外汇': '#34d399'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            setInterval(loadData, 5 * 60 * 1000);
        });

        async function loadData() {
            try {
                showToast('正在加载数据...', 'info');
                const response = await fetch('/api/recommendations');
                const data = await response.json();
                currentData = data;
                updateUI(data);
                updateCharts(data);
                document.getElementById('lastUpdated').textContent = new Date().toLocaleString('zh-CN');
                showToast('数据加载成功', 'success');
            } catch (error) {
                console.error('加载失败:', error);
                loadDefaultData();
                showToast('使用默认数据', 'error');
            }
        }

        function loadDefaultData() {
            const defaultData = {
                date: new Date().toISOString().split('T')[0],
                market_outlook: '维持当前配置，关注再平衡机会',
                rebalance_actions: [
                    { asset: '公募基金', action: '买入', amount: 500000, reason: '当前配置22%，低于目标25%' },
                    { asset: '黄金', action: '卖出', amount: 100000, reason: '当前配置7%，高于目标5%' }
                ],
                top_picks: [
                    { name: '易方达蓝筹精选', type: '混合型', expected_return: 0.12, risk: '中' },
                    { name: '博时信用债', type: '债券型', expected_return: 0.04, risk: '中低' },
                    { name: '广发稳健增长', type: '混合型', expected_return: 0.06, risk: '中低' }
                ],
                portfolio: {
                    total_capital: 5000000,
                    portfolio_metrics: {
                        expected_return: 0.0405,
                        volatility: 0.082,
                        sharpe_ratio: 1.42,
                        max_drawdown: 0.12,
                        var_95: 0.015
                    },
                    allocation: [
                        { asset: '货币基金', ratio: 0.20, amount: 1000000, expected_return: 0.021, risk_level: '极低' },
                        { asset: '银行理财', ratio: 0.35, amount: 1750000, expected_return: 0.035, risk_level: '低' },
                        { asset: '债券', ratio: 0.15, amount: 750000, expected_return: 0.040, risk_level: '中低' },
                        { asset: '公募基金', ratio: 0.20, amount: 1000000, expected_return: 0.080, risk_level: '中' },
                        { asset: '黄金', ratio: 0.05, amount: 250000, expected_return: 0.030, risk_level: '中高' },
                        { asset: '外汇', ratio: 0.05, amount: 250000, expected_return: 0.020, risk_level: '中' }
                    ]
                }
            };
            updateUI(defaultData);
            updateCharts(defaultData);
        }

        function updateUI(data) {
            const portfolio = data.portfolio || {};
            const metrics = portfolio.portfolio_metrics || {};
            const allocation = portfolio.allocation || [];

            // Stats
            animateValue('totalCapital', portfolio.total_capital || 5000000, formatCurrency);
            document.getElementById('expectedReturn').textContent = ((metrics.expected_return || 0) * 100).toFixed(2) + '%';
            document.getElementById('sharpeRatio').textContent = (metrics.sharpe_ratio || 0).toFixed(2);
            document.getElementById('var95').textContent = ((metrics.var_95 || 0) * 100).toFixed(2) + '%';
            document.getElementById('capitalChange').textContent = '+0.00%';

            // Gauges
            const riskMap = { '极低': 1, '低': 2, '中低': 3, '中': 4, '中高': 5, '高': 6 };
            const avgRisk = allocation.length > 0 
                ? allocation.reduce((sum, a) => sum + (riskMap[a.risk_level] || 3), 0) / allocation.length 
                : 3;
            document.getElementById('riskLevel').textContent = ['极低', '低', '中低', '中', '中高', '高'][Math.round(avgRisk) - 1] || '中';
            document.getElementById('volatility').textContent = ((metrics.volatility || 0) * 100).toFixed(1) + '%';
            document.getElementById('maxDrawdown').textContent = ((metrics.max_drawdown || 0) * 100).toFixed(1) + '%';
            document.getElementById('liquidity').textContent = '优';

            // Rebalance Actions
            const actionsContainer = document.getElementById('rebalanceActions');
            const actions = data.rebalance_actions || [];
            if (actions.length === 0) {
                actionsContainer.innerHTML = '<div class="action-item"><div class="action-content"><div class="action-asset">✅ 暂无调仓建议</div><div class="action-reason">当前配置合理，无需调整</div></div></div>';
            } else {
                actionsContainer.innerHTML = actions.map(action => `
                    <div class="action-item ${action.action === '买入' ? 'buy' : 'sell'}">
                        <span class="action-badge ${action.action === '买入' ? 'buy' : 'sell'}">${action.action}</span>
                        <div class="action-content">
                            <div class="action-asset">${action.asset}</div>
                            <div class="action-reason">${action.reason}</div>
                        </div>
                        <div class="action-amount">¥${(action.amount / 10000).toFixed(0)}万</div>
                    </div>
                `).join('');
            }

            // Top Picks
            const picksContainer = document.getElementById('topPicks');
            const picks = data.top_picks || [];
            if (picks.length === 0) {
                picksContainer.innerHTML = '<div class="pick-item"><div class="pick-info"><div class="pick-name">暂无精选推荐</div></div></div>';
            } else {
                picksContainer.innerHTML = picks.map(pick => `
                    <div class="pick-item">
                        <div class="pick-info">
                            <div class="pick-name">${pick.name}</div>
                            <div class="pick-type">${pick.type} | ${pick.risk}风险</div>
                        </div>
                        <div class="pick-return">+${(pick.expected_return * 100).toFixed(1)}%</div>
                    </div>
                `).join('');
            }

            // Allocation Table
            const tableBody = document.getElementById('allocationTable');
            tableBody.innerHTML = allocation.map(item => {
                const iconClass = item.asset.includes('货币') ? 'money' 
                    : item.asset.includes('银行') ? 'bank'
                    : item.asset.includes('债券') ? 'bond'
                    : item.asset.includes('基金') ? 'fund'
                    : item.asset.includes('黄金') ? 'gold'
                    : 'forex';
                const icon = { money: '💰', bank: '🏦', bond: '📄', fund: '📈', gold: '🥇', forex: '💱' }[iconClass];
                const color = colorMap[item.asset] || '#6b7280';
                return `
                    <tr>
                        <td>
                            <div class="asset-cell">
                                <div class="asset-icon ${iconClass}">${icon}</div>
                                ${item.asset}
                            </div>
                        </td>
                        <td>
                            <div class="ratio-bar">
                                <div class="ratio-fill" style="width: ${item.ratio * 100}%; background: ${color};"></div>
                            </div>
                            ${(item.ratio * 100).toFixed(1)}%
                        </td>
                        <td class="amount-cell">¥${(item.amount / 10000).toFixed(0)}万</td>
                        <td class="return-cell">${(item.expected_return * 100).toFixed(2)}%</td>
                        <td><span class="risk-badge ${item.risk_level === '极低' || item.risk_level === '低' ? 'low' : item.risk_level === '中' || item.risk_level === '中低' ? 'medium' : 'high'}">${item.risk_level}</span></td>
                    </tr>
                `;
            }).join('');

            // Market Sentiment (mock)
            document.getElementById('shIndex').textContent = '3150.00';
            document.getElementById('shIndex').className = 'sentiment-value up';
            document.getElementById('hs300Index').textContent = '3850.00';
            document.getElementById('hs300Index').className = 'sentiment-value up';
            document.getElementById('sentimentScore').textContent = '65';
            document.getElementById('sentimentScore').className = 'sentiment-value up';
        }

        function updateCharts(data) {
            const portfolio = data.portfolio || {};
            const allocation = portfolio.allocation || [];

            // Pie Chart
            const pieCtx = document.getElementById('allocationChart').getContext('2d');
            if (allocationChart) allocationChart.destroy();

            allocationChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: allocation.map(a => a.asset),
                    datasets: [{
                        data: allocation.map(a => a.ratio * 100),
                        backgroundColor: allocation.map(a => colorMap[a.asset] || '#6b7280'),
                        borderWidth: 0,
                        hoverOffset: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${ctx.raw.toFixed(1)}%`
                            }
                        }
                    },
                    animation: { animateRotate: true, duration: 1200 }
                }
            });

            // Performance Chart
            const perfCtx = document.getElementById('performanceChart').getContext('2d');
            if (performanceChart) performanceChart.destroy();

            const labels = [];
            const values = [];
            let value = 100;
            const now = new Date();
            for (let i = 30; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(`${date.getMonth() + 1}/${date.getDate()}`);
                value = value * (1 + (Math.random() - 0.48) * 0.015);
                values.push(value);
            }

            performanceChart = new Chart(perfCtx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: '组合净值',
                        data: values,
                        borderColor: '#00d4aa',
                        backgroundColor: 'rgba(0, 212, 170, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 0,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280', maxTicksLimit: 8 } },
                        y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b7280' } }
                    },
                    interaction: { intersect: false, mode: 'index' },
                    animation: { duration: 1200 }
                }
            });

            document.getElementById('totalDisplay').textContent = formatCompact(portfolio.total_capital || 5000000);
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '刷新中...';
            try {
                await fetch('/api/refresh', { method: 'POST' });
                await loadData();
            } catch (error) {
                showToast('刷新失败', 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新';
            }
        }

        async function pushToFeishu() {
            const btn = document.getElementById('pushBtn');
            btn.disabled = true;
            btn.textContent = '推送中...';
            try {
                const response = await fetch('/api/push', { method: 'POST' });
                const result = await response.json();
                showToast(result.message || '推送成功', result.status === 'success' ? 'success' : 'error');
            } catch (error) {
                showToast('推送失败', 'error');
            } finally {
                btn.textContent = '📨 推送飞书';
                btn.disabled = false;
            }
        }

        // Utilities
        function formatCurrency(value) {
            if (value >= 100000000) return '¥' + (value / 100000000).toFixed(2) + '亿';
            if (value >= 10000) return '¥' + (value / 10000).toFixed(0) + '万';
            return '¥' + value.toFixed(0);
        }

        function formatCompact(value) {
            if (value >= 100000000) return (value / 100000000).toFixed(1) + '亿';
            if (value >= 10000) return (value / 10000).toFixed(0) + '万';
            return value.toFixed(0);
        }

        function animateValue(id, end, formatter) {
            const el = document.getElementById(id);
            const start = 0;
            const duration = 1000;
            const startTime = performance.now();
            const animate = (currentTime) => {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = start + (end - start) * eased;
                el.textContent = formatter(current);
                if (progress < 1) requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            document.getElementById('toastIcon').textContent = type === 'success' ? '✅' : '❌';
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

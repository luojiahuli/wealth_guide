<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日理财指南 - Wealth Guide</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117;
            color: #e5e7eb;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1f2937;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #4fd1c5;
        }
        
        .header-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .last-updated {
            color: #6b7280;
            font-size: 14px;
        }
        
        .refresh-btn {
            background: #4fd1c5;
            color: #0f1117;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .refresh-btn:hover {
            background: #2dd4bf;
        }
        
        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: #1a1f36;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3748;
        }
        
        .stat-label {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #e5e7eb;
        }
        
        .stat-value.positive {
            color: #10b981;
        }
        
        .stat-sub {
            color: #6b7280;
            font-size: 12px;
            margin-top: 4px;
        }
        
        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 900px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .chart-card {
            background: #1a1f36;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3748;
        }
        
        .chart-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #e5e7eb;
        }
        
        .chart-container {
            position: relative;
            height: 300px;
        }
        
        /* Metrics */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .metric-item {
            background: #1a1f36;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #2d3748;
        }
        
        .metric-label {
            color: #6b7280;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .metric-value {
            font-size: 20px;
            font-weight: 600;
        }
        
        /* Recommendations */
        .recommendations-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        @media (max-width: 900px) {
            .recommendations-section {
                grid-template-columns: 1fr;
            }
        }
        
        .recommendations-card {
            background: #1a1f36;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3748;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-item {
            background: #0f1117;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 3px solid #4fd1c5;
        }
        
        .action-item.buy {
            border-left-color: #10b981;
        }
        
        .action-item.sell {
            border-left-color: #ef4444;
        }
        
        .action-title {
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .action-desc {
            font-size: 12px;
            color: #6b7280;
        }
        
        .pick-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2d3748;
        }
        
        .pick-item:last-child {
            border-bottom: none;
        }
        
        .pick-name {
            font-weight: 500;
        }
        
        .pick-type {
            font-size: 12px;
            color: #6b7280;
        }
        
        .pick-return {
            color: #10b981;
            font-weight: 600;
        }
        
        /* Allocation Table */
        .allocation-section {
            background: #1a1f36;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3748;
            margin-bottom: 30px;
        }
        
        .allocation-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .allocation-table th,
        .allocation-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2d3748;
        }
        
        .allocation-table th {
            color: #6b7280;
            font-weight: 500;
            font-size: 12px;
            text-transform: uppercase;
        }
        
        .allocation-bar {
            width: 100%;
            height: 8px;
            background: #2d3748;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .allocation-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .color-money { background: #4fd1c5; }
        .color-bank { background: #60a5fa; }
        .color-bond { background: #a78bfa; }
        .color-fund { background: #f472b6; }
        .color-gold { background: #fbbf24; }
        .color-forex { background: #34d399; }
        
        /* Market Outlook */
        .outlook-section {
            background: #1a1f36;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #2d3748;
            margin-bottom: 30px;
        }
        
        .outlook-text {
            color: #d1d5db;
            line-height: 1.6;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 12px;
        }
        
        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #6b7280;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #2d3748;
            border-top-color: #4fd1c5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Push Button */
        .push-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .push-btn:hover {
            background: #4f46e5;
        }
        
        .push-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 每日理财指南</h1>
            <div class="header-info">
                <span class="last-updated">最后更新: <span id="lastUpdated">-</span></span>
                <button class="push-btn" onclick="pushToFeishu()" id="pushBtn">📨 推送飞书</button>
                <button class="refresh-btn" onclick="refreshData()" id="refreshBtn">🔄 刷新数据</button>
            </div>
        </div>
        
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">总资产</div>
                <div class="stat-value" id="totalCapital">-</div>
                <div class="stat-sub">人民币 (元)</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">预期年化收益</div>
                <div class="stat-value positive" id="expectedReturn">-</div>
                <div class="stat-sub">组合预期</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">夏普比率</div>
                <div class="stat-value" id="sharpeRatio">-</div>
                <div class="stat-sub">风险调整收益</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">VaR (95%)</div>
                <div class="stat-value" id="var95">-</div>
                <div class="stat-sub">最大日损失</div>
            </div>
        </div>
        
        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">资产配置</div>
                <div class="chart-container">
                    <canvas id="allocationChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">收益走势 (模拟)</div>
                <div class="chart-container">
                    <canvas id="performanceChart"></canvas>
                </div>
            </div>
        </div>
        
        <!-- Metrics -->
        <div class="metrics-grid">
            <div class="metric-item">
                <div class="metric-label">波动率</div>
                <div class="metric-value" id="volatility">-</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">最大回撤</div>
                <div class="metric-value" id="maxDrawdown">-</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">风险等级</div>
                <div class="metric-value" id="riskLevel">中</div>
            </div>
            <div class="metric-item">
                <div class="metric-label">优化方法</div>
                <div class="metric-value" id="optMethod">风险平价</div>
            </div>
        </div>
        
        <!-- Recommendations -->
        <div class="recommendations-section">
            <div class="recommendations-card">
                <div class="section-title">💡 今日操作建议</div>
                <div id="rebalanceActions">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
            <div class="recommendations-card">
                <div class="section-title">🎯 精选推荐</div>
                <div id="topPicks">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
        
        <!-- Allocation Table -->
        <div class="allocation-section">
            <div class="section-title">📋 资产明细</div>
            <table class="allocation-table">
                <thead>
                    <tr>
                        <th>资产类别</th>
                        <th>配置比例</th>
                        <th>目标金额</th>
                        <th>预期收益</th>
                        <th>风险等级</th>
                    </tr>
                </thead>
                <tbody id="allocationTable">
                    <tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Market Outlook -->
        <div class="outlook-section">
            <div class="section-title">📈 市场展望</div>
            <div class="outlook-text" id="marketOutlook">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            ⚠️ 本建议仅供参考，投资有风险，入市需谨慎 | Wealth Guide v1.0
        </div>
    </div>
    
    <script>
        // 全局变量
        let allocationChart = null;
        let performanceChart = null;
        let currentData = null;
        
        // 颜色映射
        const colorMap = {
            '货币基金': '#4fd1c5',
            '银行理财': '#60a5fa',
            '债券': '#a78bfa',
            '公募基金': '#f472b6',
            '黄金': '#fbbf24',
            '外汇': '#34d399'
        };
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            
            // 每15分钟自动刷新
            setInterval(loadData, 15 * 60 * 1000);
        });
        
        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('/api/recommendations');
                const data = await response.json();
                currentData = data;
                
                updateUI(data);
                updateCharts(data);
                
                document.getElementById('lastUpdated').textContent = 
                    new Date().toLocaleString('zh-CN');
            } catch (error) {
                console.error('加载数据失败:', error);
                // 使用默认数据
                loadDefaultData();
            }
        }
        
        // 加载默认数据
        function loadDefaultData() {
            const defaultData = {
                date: new Date().toISOString().split('T')[0],
                market_outlook: '维持当前配置，关注再平衡机会',
                rebalance_actions: [],
                top_picks: [
                    { name: '易方达蓝筹精选', type: '混合型', expected_return: 0.12, risk: '中' },
                    { name: '广发稳健增长', type: '混合型', expected_return: 0.06, risk: '中低' },
                    { name: '博时信用债', type: '债券型', expected_return: 0.04, risk: '中低' }
                ],
                portfolio: {
                    total_capital: 5000000,
                    portfolio_metrics: {
                        expected_return: 0.0405,
                        volatility: 0.082,
                        sharpe_ratio: 1.42,
                        max_drawdown: 0.12,
                        var_95: 0.015
                    },
                    allocation: [
                        { asset: '货币基金', ratio: 0.25, amount: 1250000, expected_return: 0.02, risk_level: '极低' },
                        { asset: '银行理财', ratio: 0.30, amount: 1500000, expected_return: 0.035, risk_level: '低' },
                        { asset: '债券', ratio: 0.15, amount: 750000, expected_return: 0.04, risk_level: '中低' },
                        { asset: '公募基金', ratio: 0.20, amount: 1000000, expected_return: 0.08, risk_level: '中' },
                        { asset: '黄金', ratio: 0.05, amount: 250000, expected_return: 0.03, risk_level: '中高' },
                        { asset: '外汇', ratio: 0.05, amount: 250000, expected_return: 0.01, risk_level: '中' }
                    ]
                }
            };
            
            updateUI(defaultData);
            updateCharts(defaultData);
        }
        
        // 更新UI
        function updateUI(data) {
            const portfolio = data.portfolio || {};
            const metrics = portfolio.portfolio_metrics || {};
            
            // Stats
            document.getElementById('totalCapital').textContent = 
                formatCurrency(portfolio.total_capital || 5000000);
            document.getElementById('expectedReturn').textContent = 
                ((metrics.expected_return || 0) * 100).toFixed(2) + '%';
            document.getElementById('sharpeRatio').textContent = 
                (metrics.sharpe_ratio || 0).toFixed(2);
            document.getElementById('var95').textContent = 
                ((metrics.var_95 || 0) * 100).toFixed(2) + '%';
            
            // Metrics
            document.getElementById('volatility').textContent = 
                ((metrics.volatility || 0) * 100).toFixed(2) + '%';
            document.getElementById('maxDrawdown').textContent = 
                ((metrics.max_drawdown || 0) * 100).toFixed(2) + '%';
            
            // Rebalance Actions
            const actionsContainer = document.getElementById('rebalanceActions');
            const actions = data.rebalance_actions || [];
            if (actions.length === 0) {
                actionsContainer.innerHTML = '<div class="action-item"><div class="action-title">✅ 暂无调仓建议</div><div class="action-desc">当前配置合理，无需调整</div></div>';
            } else {
                actionsContainer.innerHTML = actions.map(action => `
                    <div class="action-item ${action.action === '买入' ? 'buy' : 'sell'}">
                        <div class="action-title">${action.action === '买入' ? '📈' : '📉'} ${action.asset}</div>
                        <div class="action-desc">${formatCurrency(action.amount)} - ${action.reason}</div>
                    </div>
                `).join('');
            }
            
            // Top Picks
            const picksContainer = document.getElementById('topPicks');
            const picks = data.top_picks || [];
            if (picks.length === 0) {
                picksContainer.innerHTML = '<div class="pick-item"><div>暂无精选推荐</div></div>';
            } else {
                picksContainer.innerHTML = picks.map(pick => `
                    <div class="pick-item">
                        <div>
                            <div class="pick-name">${pick.name}</div>
                            <div class="pick-type">${pick.type} | ${pick.risk}风险</div>
                        </div>
                        <div class="pick-return">${(pick.expected_return * 100).toFixed(1)}%</div>
                    </div>
                `).join('');
            }
            
            // Allocation Table
            const tableBody = document.getElementById('allocationTable');
            const allocation = portfolio.allocation || [];
            tableBody.innerHTML = allocation.map(item => `
                <tr>
                    <td>${item.asset}</td>
                    <td>
                        <div class="allocation-bar">
                            <div class="allocation-bar-fill ${getColorClass(item.asset)}" 
                                 style="width: ${(item.ratio * 100)}%"></div>
                        </div>
                        ${(item.ratio * 100).toFixed(1)}%
                    </td>
                    <td>${formatCurrency(item.amount)}</td>
                    <td>${(item.expected_return * 100).toFixed(2)}%</td>
                    <td>${item.risk_level || '中'}</td>
                </tr>
            `).join('');
            
            // Market Outlook
            document.getElementById('marketOutlook').textContent = 
                data.market_outlook || '维持当前配置，关注再平衡机会';
        }
        
        // 更新图表
        function updateCharts(data) {
            const portfolio = data.portfolio || {};
            const allocation = portfolio.allocation || [];
            
            // Pie Chart - Allocation
            const pieCtx = document.getElementById('allocationChart').getContext('2d');
            
            if (allocationChart) {
                allocationChart.destroy();
            }
            
            allocationChart = new Chart(pieCtx, {
                type: 'doughnut',
                data: {
                    labels: allocation.map(a => a.asset),
                    datasets: [{
                        data: allocation.map(a => a.ratio * 100),
                        backgroundColor: allocation.map(a => colorMap[a.asset] || '#6b7280'),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#e5e7eb',
                                font: { size: 12 },
                                padding: 15
                            }
                        }
                    }
                }
            });
            
            // Performance Chart - Simulated 30-day history
            const perfCtx = document.getElementById('performanceChart').getContext('2d');
            
            if (performanceChart) {
                performanceChart.destroy();
            }
            
            // 生成模拟数据
            const labels = [];
            const values = [];
            let value = 100;
            const now = new Date();
            
            for (let i = 30; i >= 0; i--) {
                const date = new Date(now);
                date.setDate(date.getDate() - i);
                labels.push(`${date.getMonth() + 1}/${date.getDate()}`);
                value = value * (1 + (Math.random() - 0.48) * 0.02);
                values.push(value);
            }
            
            performanceChart = new Chart(perfCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '组合净值',
                        data: values,
                        borderColor: '#4fd1c5',
                        backgroundColor: 'rgba(79, 209, 197, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: '#2d3748' },
                            ticks: { color: '#6b7280' }
                        },
                        y: {
                            grid: { color: '#2d3748' },
                            ticks: { color: '#6b7280' }
                        }
                    }
                }
            });
        }
        
        // 刷新数据
        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '刷新中...';
            
            try {
                await fetch('/api/refresh', { method: 'POST' });
                await loadData();
            } catch (error) {
                console.error('刷新失败:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 刷新数据';
            }
        }
        
        // 推送飞书
        async function pushToFeishu() {
            const btn = document.getElementById('pushBtn');
            btn.disabled = true;
            btn.textContent = '推送中...';
            
            try {
                const response = await fetch('/api/push', { method: 'POST' });
                const result = await response.json();
                
                if (result.status === 'success') {
                    btn.textContent = '✅ 已推送';
                } else {
                    btn.textContent = '⚠️ ' + result.message;
                }
                
                setTimeout(() => {
                    btn.textContent = '📨 推送飞书';
                    btn.disabled = false;
                }, 3000);
            } catch (error) {
                console.error('推送失败:', error);
                btn.textContent = '❌ 推送失败';
                setTimeout(() => {
                    btn.textContent = '📨 推送飞书';
                    btn.disabled = false;
                }, 3000);
            }
        }
        
        // 工具函数
        function formatCurrency(amount) {
            if (amount >= 100000000) {
                return '¥' + (amount / 100000000).toFixed(2) + '亿';
            } else if (amount >= 10000) {
                return '¥' + (amount / 10000).toFixed(0) + '万';
            } else {
                return '¥' + amount.toFixed(0);
            }
        }
        
        function getColorClass(asset) {
            if (asset.includes('货币')) return 'color-money';
            if (asset.includes('银行')) return 'color-bank';
            if (asset.includes('债券')) return 'color-bond';
            if (asset.includes('基金')) return 'color-fund';
            if (asset.includes('黄金')) return 'color-gold';
            if (asset.includes('外汇')) return 'color-forex';
            return 'color-fund';
        }
    </script>
</body>
</html>
